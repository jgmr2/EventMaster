services:
  app:
    build: .
    restart: on-failure 
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://db:27017/urban_alert 
    depends_on:
      - db

  db:
    image: mongo:latest
    restart: always 
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: