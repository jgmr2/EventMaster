tags:
  - name: Eventos
    description: Endpoints para la gestión, consulta y actualización de eventos.

paths:
  /event:
    get:
      summary: Obtener todos los eventos
      description: Retorna una lista completa de todos los eventos registrados en el sistema. Es una ruta pública.
      tags: [Eventos]
      responses:
        200:
          description: Lista de eventos obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                      example: "64a7b9c2f1e3a40012345678"
                    title:
                      type: string
                      example: "Concierto de Rock"
                    startTime:
                      type: string
                      format: date-time
                      example: "2026-11-15T09:00:00.000Z"
                    endTime:
                      type: string
                      format: date-time
                      example: "2026-11-15T18:00:00.000Z"
                    location:
                      type: string
                      example: "Auditorio Nacional"
                    capacity:
                      type: number
                      example: 10000
                    createdBy:
                      type: string
                      example: "69c86fd26831072ddb2c30b1"
        500:
          description: Error interno del servidor.

  /event/new:
    post:
      summary: Crear un nuevo evento
      description: Crea un nuevo evento en la base de datos. Valida que el lugar elegido no esté ocupado en el mismo rango de horario. Solo accesible para usuarios autenticados.
      tags: [Eventos]
      security:
        - bearerAuth: []
      requestBody:
        description: Datos necesarios para crear el evento.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, startTime, endTime, location, capacity]
              properties:
                title:
                  type: string
                  description: Título del evento.
                  example: "Conferencia de Tecnología 2026"
                startTime:
                  type: string
                  format: date-time
                  description: Fecha y hora exacta de inicio del evento.
                  example: "2026-11-15T09:00:00.000Z"
                endTime:
                  type: string
                  format: date-time
                  description: Fecha y hora exacta de finalización del evento.
                  example: "2026-11-15T18:00:00.000Z"
                location:
                  type: string
                  description: Lugar donde se realizará el evento.
                  example: "Centro de Convenciones"
                capacity:
                  type: number
                  description: Aforo máximo permitido.
                  example: 500
      responses:
        201:
          description: Evento creado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                    example: "64a7b9c2f1e3a40012345678"
                  title:
                    type: string
                    example: "Conferencia de Tecnología 2026"
                  startTime:
                    type: string
                    format: date-time
                    example: "2026-11-15T09:00:00.000Z"
                  endTime:
                    type: string
                    format: date-time
                    example: "2026-11-15T18:00:00.000Z"
                  location:
                    type: string
                    example: "Centro de Convenciones"
                  capacity:
                    type: number
                    example: 500
                  createdBy:
                    type: string
                    description: ID del usuario que creó el evento.
                    example: "69c86fd26831072ddb2c30b1"
        400:
          description: Error de validación (faltan datos, formato inválido, o cruce de horarios).
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "El lugar 'Centro de Convenciones' ya está ocupado en ese horario."
        401:
          description: No autorizado. Falla el token de autenticación.
        500:
          description: Error interno del servidor.

  /event/{id}:
    get:
      summary: Obtener un evento por ID
      description: Busca y retorna la información detallada de un evento específico utilizando su ID. Es una ruta pública.
      tags: [Eventos]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID único del evento proporcionado por MongoDB.
          example: "64a7b9c2f1e3a40012345678"
      responses:
        200:
          description: Evento encontrado y retornado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                    example: "64a7b9c2f1e3a40012345678"
                  title:
                    type: string
                    example: "Concierto de Rock"
                  startTime:
                    type: string
                    format: date-time
                    example: "2026-11-15T09:00:00.000Z"
                  endTime:
                    type: string
                    format: date-time
                    example: "2026-11-15T18:00:00.000Z"
                  location:
                    type: string
                    example: "Auditorio Nacional"
                  capacity:
                    type: number
                    example: 10000
        400:
          description: Formato de ID inválido.
        404:
          description: Evento no encontrado.
        500:
          description: Error interno del servidor.
          
    patch:
      summary: Actualizar un evento existente
      description: Modifica parcialmente los datos de un evento. Solo accesible para usuarios autenticados.
      tags: [Eventos]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del evento a actualizar.
          example: "64a7b9c2f1e3a40012345678"
      requestBody:
        description: Campos del evento que se desean modificar.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "Conferencia de Tecnología 2026 (Actualizada)"
                capacity:
                  type: number
                  example: 600
                startTime:
                  type: string
                  format: date-time
                  example: "2026-11-15T10:00:00.000Z"
                endTime:
                  type: string
                  format: date-time
                  example: "2026-11-15T20:00:00.000Z"
      responses:
        200:
          description: Evento actualizado exitosamente.
        400:
          description: Datos inválidos enviados en la petición.
        401:
          description: No autorizado. Falla el token de autenticación.
        404:
          description: Evento no encontrado.
        500:
          description: Error interno del servidor.