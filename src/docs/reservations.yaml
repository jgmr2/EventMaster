tags:
  - name: Reservas
    description: Endpoints para compra, gestión de tickets, check-in y reportes de reservas.

paths:
  /reservations:
    post:
      summary: Crear una reserva
      description: Crea una reserva para un evento y zona específica. Requiere autenticación (`user`, `admin` u `organizer`).
      tags: [Reservas]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationCreateRequest'
      responses:
        201:
          description: Reserva creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        400:
          description: Faltan campos, evento sin disponibilidad o estado no permitido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Evento o zona no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Error interno del servidor.

  /reservations/my-tickets:
    get:
      summary: Obtener mis tickets
      description: Devuelve las reservas del usuario autenticado, ordenadas de más reciente a más antigua.
      tags: [Reservas]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de reservas obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyTicketReservationResponse'
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Error interno del servidor.

  /reservations/{id}:
    delete:
      summary: Cancelar una reserva
      description: Cancela una reserva y libera el cupo de la zona asociada. Solo el dueño o `admin` pueden cancelar.
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        200:
          description: Reserva cancelada correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Reserva cancelada y cupo liberado"
                  reservation:
                    $ref: '#/components/schemas/ReservationResponse'
        400:
          description: La reserva ya estaba cancelada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: No tiene permisos para cancelar la reserva.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Reserva no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Error interno del servidor.

  /reservations/{id}/check-in:
    patch:
      summary: Realizar check-in de una reserva
      description: Marca una reserva como ingresada. Requiere rol `staff` o `admin`.
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ReservationId'
      responses:
        200:
          description: Check-in realizado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Check-in realizado correctamente"
                  reservation:
                    $ref: '#/components/schemas/CheckInReservationResponse'
        400:
          description: Reserva cancelada o check-in ya realizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Requiere rol staff o admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Reserva no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Error interno del servidor.

  /reservations/event/{eventId}:
    get:
      summary: Reporte de reservas por evento
      description: Retorna resumen y detalle de reservas de un evento. Requiere rol `admin`, `organizer` o `artist`.
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        200:
          description: Reporte generado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventReservationsReportResponse'
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Requiere rol admin, organizer o artist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Evento no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Error interno del servidor.

components:
  parameters:
    ReservationId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: ID de la reserva (MongoDB ObjectId).
      example: "64a7b9c2f1e3a40012345680"

    EventId:
      in: path
      name: eventId
      required: true
      schema:
        type: string
      description: ID del evento (MongoDB ObjectId).
      example: "64a7b9c2f1e3a40012345678"

  schemas:
    ReservationCreateRequest:
      type: object
      required: [eventId, zone]
      properties:
        eventId:
          type: string
          example: "64a7b9c2f1e3a40012345678"
        zone:
          type: string
          example: "VIP"

    ReservationResponse:
      type: object
      properties:
        _id:
          type: string
          example: "64a7b9c2f1e3a40012345680"
        user:
          type: string
          example: "64a7b9c2f1e3a40012345001"
        event:
          type: string
          example: "64a7b9c2f1e3a40012345678"
        zone:
          type: string
          example: "VIP"
        qrCode:
          type: string
          example: "b9139d62-83ee-4ab9-9e8a-2ea8d57e8d9f"
        status:
          type: string
          enum: [active, cancelled]
          example: "active"
        checkedIn:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MyTicketReservationResponse:
      type: object
      properties:
        _id:
          type: string
          example: "64a7b9c2f1e3a40012345680"
        user:
          type: string
          example: "64a7b9c2f1e3a40012345001"
        event:
          type: object
          properties:
            _id:
              type: string
              example: "64a7b9c2f1e3a40012345678"
            title:
              type: string
              example: "Concierto de Rock"
            location:
              type: string
              example: "Arena Ciudad de Mexico"
            startTime:
              type: string
              format: date-time
            endTime:
              type: string
              format: date-time
            status:
              type: string
              example: "published"
        zone:
          type: string
          example: "VIP"
        qrCode:
          type: string
          example: "b9139d62-83ee-4ab9-9e8a-2ea8d57e8d9f"
        status:
          type: string
          enum: [active, cancelled]
          example: "active"
        checkedIn:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CheckInReservationResponse:
      type: object
      properties:
        _id:
          type: string
          example: "64a7b9c2f1e3a40012345680"
        user:
          type: object
          properties:
            _id:
              type: string
              example: "64a7b9c2f1e3a40012345001"
            name:
              type: string
              example: "Ana Perez"
            email:
              type: string
              format: email
              example: "ana@eventmaster.com"
        event:
          type: object
          properties:
            _id:
              type: string
              example: "64a7b9c2f1e3a40012345678"
            title:
              type: string
              example: "Concierto de Rock"
            startTime:
              type: string
              format: date-time
            endTime:
              type: string
              format: date-time
            status:
              type: string
              example: "published"
        zone:
          type: string
          example: "VIP"
        qrCode:
          type: string
          example: "b9139d62-83ee-4ab9-9e8a-2ea8d57e8d9f"
        status:
          type: string
          enum: [active, cancelled]
          example: "active"
        checkedIn:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EventReservationsReportResponse:
      type: object
      properties:
        event:
          type: object
          properties:
            _id:
              type: string
              example: "64a7b9c2f1e3a40012345678"
            title:
              type: string
              example: "Concierto de Rock"
            status:
              type: string
              example: "published"
        summary:
          type: object
          properties:
            totalCapacity:
              type: number
              example: 10000
            totalActive:
              type: number
              example: 8500
            totalCheckedIn:
              type: number
              example: 1200
            totalCancelled:
              type: number
              example: 34
        zonesReport:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: "VIP"
              capacity:
                type: number
                example: 500
              occupied:
                type: number
                example: 430
              available:
                type: number
                example: 70
              price:
                type: number
                example: 250
        reservations:
          type: array
          items:
            $ref: '#/components/schemas/CheckInReservationResponse'

    Error:
      type: object
      properties:
        msg:
          type: string
