tags:
  - name: Sedes
    description: Endpoints del módulo de sedes (`placesRoutes.js`).

paths:
  /places:
    get:
      summary: Obtener todas las sedes
      description: Retorna todas las sedes registradas ordenadas por nombre. Ruta pública.
      tags: [Sedes]
      responses:
        200:
          description: Lista de sedes obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlaceResponse'
        500:
          description: Error interno del servidor.

    post:
      summary: Registrar una nueva sede
      description: Crea una sede física. Requiere rol `admin`.
      tags: [Sedes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceCreateRequest'
      responses:
        201:
          description: Sede creada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Sede creada exitosamente"
                  place:
                    $ref: '#/components/schemas/PlaceResponse'
        400:
          description: Nombre duplicado o capacidad de zonas inválida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Requiere rol admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                msg: "No tienes permisos para esta acción"
        500:
          description: Error interno del servidor.

  /places/{id}/availability:
    get:
      summary: Disponibilidad de una sede
      description: Lista eventos activos asociados a la sede por nombre. Permite filtrar por día con `date=YYYY-MM-DD`.
      tags: [Sedes]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
          example: "2026-11-15"
      responses:
        200:
          description: Disponibilidad obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  place:
                    $ref: '#/components/schemas/PlaceResponse'
                  date:
                    type: string
                    example: "2026-11-15"
                  totalEvents:
                    type: number
                    example: 2
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        title:
                          type: string
                        startTime:
                          type: string
                          format: date-time
                        endTime:
                          type: string
                          format: date-time
                        status:
                          type: string
        404:
          description: Sede no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Error interno del servidor.

components:
  parameters:
    PlaceId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: ID de la sede (MongoDB ObjectId)
      example: "64a7b9c2f1e3a40012345679"

  schemas:
    PlaceCreateRequest:
      type: object
      required: [name, location, maxCapacity]
      properties:
        name:
          type: string
          example: "Arena Ciudad de México"
        address:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            country:
              type: string
            zipCode:
              type: string
        location:
          type: object
          required: [type, coordinates]
          properties:
            type:
              type: string
              enum: [Point]
              example: "Point"
            coordinates:
              type: array
              items:
                type: number
              example: [-99.1764, 19.4975]
        defaultZones:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              capacity:
                type: number
              description:
                type: string
        maxCapacity:
          type: number
          example: 22000
        contactPhone:
          type: string
        amenities:
          type: array
          items:
            type: string

    PlaceResponse:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        address:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            country:
              type: string
            zipCode:
              type: string
        location:
          type: object
          properties:
            type:
              type: string
            coordinates:
              type: array
              items:
                type: number
        defaultZones:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              capacity:
                type: number
              description:
                type: string
        maxCapacity:
          type: number
        contactPhone:
          type: string
        amenities:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        msg:
          type: string
