tags:
  - name: Sedes
    description: Endpoints para la gestión y consulta de sedes físicas donde se realizan los eventos.

paths:
  /places:
    get:
      summary: Obtener todas las sedes
      description: Retorna el listado completo de sedes físicas registradas con su dirección y capacidad. Ruta pública.
      tags: [Sedes]
      responses:
        200:
          description: Lista de sedes obtenida exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlaceResponse'
        500:
          description: Error interno del servidor.

    post:
      summary: Registrar una nueva sede
      description: Crea una nueva sede física en el sistema. Acceso restringido a **Admin**.
      tags: [Sedes]
      security:
        - bearerAuth: []
      requestBody:
        description: Datos de la nueva sede.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, address, capacity]
              properties:
                name:
                  type: string
                  description: Nombre de la sede.
                  example: "Auditorio Nacional"
                address:
                  type: string
                  description: Dirección física completa. Debe ser única.
                  example: "Paseo de la Reforma 50, Ciudad de México"
                capacity:
                  type: number
                  description: Capacidad máxima total de la sede.
                  example: 10000
                features:
                  type: array
                  description: Lista de características o servicios disponibles en la sede.
                  items:
                    type: string
                  example: ["estacionamiento", "aire acondicionado", "acceso para discapacitados"]
      responses:
        201:
          description: Sede creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceResponse'
        400:
          description: Error de validación o dirección duplicada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                msg: "Ya existe una sede con esa dirección"
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Requiere rol admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                msg: "No tienes permisos para esta acción"
        500:
          description: Error interno del servidor.

  /places/{id}/availability:
    get:
      summary: Verificar disponibilidad de fechas en una sede
      description: Retorna los eventos activos agendados en la sede. Acepta un parámetro opcional `date` (YYYY-MM-DD) para filtrar por día específico. Ruta pública.
      tags: [Sedes]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
        - in: query
          name: date
          required: false
          schema:
            type: string
            format: date
          description: Fecha a consultar en formato YYYY-MM-DD. Si se omite, retorna todos los eventos futuros.
          example: "2026-11-15"
      responses:
        200:
          description: Disponibilidad de la sede obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  place:
                    $ref: '#/components/schemas/PlaceResponse'
                  date:
                    type: string
                    example: "2026-11-15"
                  totalEvents:
                    type: number
                    example: 2
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          example: "64a7b9c2f1e3a40012345678"
                        title:
                          type: string
                          example: "Concierto de Rock"
                        startTime:
                          type: string
                          format: date-time
                          example: "2026-11-15T09:00:00.000Z"
                        endTime:
                          type: string
                          format: date-time
                          example: "2026-11-15T18:00:00.000Z"
                        status:
                          type: string
                          example: "published"
        404:
          description: Sede no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                msg: "Sede no encontrada"
        500:
          description: Error interno del servidor.

components:
  parameters:
    PlaceId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: ID único de la sede (MongoDB ObjectId).
      example: "64a7b9c2f1e3a40012345679"

  schemas:
    PlaceResponse:
      type: object
      properties:
        _id:
          type: string
          example: "64a7b9c2f1e3a40012345679"
        name:
          type: string
          example: "Auditorio Nacional"
        address:
          type: string
          example: "Paseo de la Reforma 50, Ciudad de México"
        capacity:
          type: number
          example: 10000
        features:
          type: array
          items:
            type: string
          example: ["estacionamiento", "aire acondicionado"]
        createdAt:
          type: string
          format: date-time
          example: "2026-04-05T12:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-05T12:30:00.000Z"

    Error:
      type: object
      properties:
        msg:
          type: string
