tags:
  - name: Auth
    description: Endpoints de autenticación, sesión y gestión de cuentas operativas por admin.

paths:
  /auth/register:
    post:
      summary: Registro público de usuario final
      description: Registra una cuenta pública. Aunque se envíe `role`, el backend siempre asigna `user`.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: "Arturo"
                email:
                  type: string
                  format: email
                  example: "artu22@eventmaster.com"
                password:
                  type: string
                  format: password
                  example: "password123"
                role:
                  type: string
                  description: Campo opcional; se ignora y se fuerza `user`.
                  enum: [admin, organizer, artist, staff, user]
                  example: "artist"
      responses:
        201:
          description: Usuario final creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicRegisterResponse'
        400:
          description: Datos inválidos o email ya registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Error interno del servidor.

  /auth/login:
    post:
      summary: Iniciar sesión
      description: Valida credenciales y retorna token JWT + metadatos de rol para renderizado de UI.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "artu22@eventmaster.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        200:
          description: Login exitoso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        400:
          description: Credenciales incorrectas o faltan campos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Error interno del servidor.

  /auth/me:
    get:
      summary: Obtener sesión actual
      description: Devuelve el perfil autenticado con `role`, `accountType` y `options`.
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Perfil de sesión obtenido correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionProfile'
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                msg: "Token no proporcionado"
        500:
          description: Error interno del servidor.

  /auth/admin/create-account:
    post:
      summary: Crear cuenta operativa (solo admin)
      description: Crea cuentas para `staff` o `artist`. Requiere usuario autenticado con rol admin.
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name:
                  type: string
                  example: "Operador Staff"
                email:
                  type: string
                  format: email
                  example: "staff.ops@eventmaster.com"
                password:
                  type: string
                  format: password
                  example: "password123"
                role:
                  type: string
                  enum: [staff, artist]
                  example: "staff"
      responses:
        201:
          description: Cuenta operativa creada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateAccountResponse'
        400:
          description: Datos inválidos, rol no permitido o email duplicado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Token ausente, expirado o inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Requiere rol admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                msg: "No tienes permisos para esta acción"
        500:
          description: Error interno del servidor.

components:
  schemas:
    PublicRegisterResponse:
      type: object
      properties:
        _id:
          type: string
          example: "60d0fe4f5311236168a109ca"
        name:
          type: string
          example: "Arturo"
        email:
          type: string
          example: "artu22@eventmaster.com"
        role:
          type: string
          enum: [admin, organizer, artist, staff, user]
          example: "user"
        accountType:
          type: string
          enum: [admin_panel, end_user]
          example: "end_user"

    LoginResponse:
      type: object
      properties:
        _id:
          type: string
          example: "60d0fe4f5311236168a109ca"
        name:
          type: string
          example: "Arturo"
        email:
          type: string
          example: "artu22@eventmaster.com"
        role:
          type: string
          enum: [admin, organizer, artist, staff, user]
          example: "staff"
        accountType:
          type: string
          enum: [admin_panel, end_user]
          example: "admin_panel"
        options:
          type: array
          items:
            type: string
          example: ["checkin:manage"]
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjYwZDAuLi4"

    SessionProfile:
      type: object
      properties:
        _id:
          type: string
          example: "60d0fe4f5311236168a109ca"
        name:
          type: string
          example: "Arturo"
        email:
          type: string
          example: "artu22@eventmaster.com"
        role:
          type: string
          enum: [admin, organizer, artist, staff, user]
          example: "user"
        accountType:
          type: string
          enum: [admin_panel, end_user]
          example: "end_user"
        options:
          type: array
          items:
            type: string
          example: ["events:view", "reservations:create"]

    AdminCreateAccountResponse:
      type: object
      properties:
        msg:
          type: string
          example: "Cuenta creada correctamente por admin"
        account:
          type: object
          properties:
            _id:
              type: string
              example: "64f1a2b3c4d5e6f7a8b9c0d1"
            name:
              type: string
              example: "Operador Staff"
            email:
              type: string
              example: "staff.ops@eventmaster.com"
            role:
              type: string
              enum: [staff, artist]
              example: "staff"
            accountType:
              type: string
              enum: [admin_panel, end_user]
              example: "admin_panel"

    Error:
      type: object
      properties:
        msg:
          type: string
