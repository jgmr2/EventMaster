tags:
  - name: Auth
    description: Endpoints para el registro, inicio de sesión y validación de la sesión de los usuarios.

paths:
  /auth/register:
    post:
      summary: Registrar un nuevo usuario
      description: Crea una nueva cuenta de usuario en la base de datos de EventMaster. Valida que el correo electrónico tenga un formato correcto y no esté registrado previamente.
      tags: [Auth]
      requestBody:
        description: Datos personales y credenciales necesarias para crear la cuenta.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  description: Nombre completo o alias del usuario.
                  example: "Arturo"
                email:
                  type: string
                  format: email
                  description: Correo electrónico del usuario. Debe ser único.
                  example: "artu22@eventmaster.com"
                password:
                  type: string
                  format: password
                  description: Contraseña segura para el usuario (se recomienda mínimo 6 caracteres).
                  example: "password123"
      responses:
        201:
          description: Usuario creado exitosamente. Devuelve los datos básicos y el token de sesión.
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Usuario registrado correctamente"
                  token:
                    type: string
                    description: JWT para autenticación futura.
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        400:
          description: Error de validación (Ej. Falta un dato, formato inválido, o usuario ya existe).
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "El usuario ya existe con ese correo"
        500:
          description: Error interno del servidor.

  /auth/login:
    post:
      summary: Iniciar sesión
      description: Valida las credenciales del usuario y, si son correctas, genera y devuelve un Json Web Token (JWT) para acceder a las rutas protegidas.
      tags: [Auth]
      requestBody:
        description: Correo y contraseña del usuario registrado.
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "artu22@eventmaster.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        200:
          description: Autenticación exitosa. Retorna el JWT.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT que debe incluirse en los headers (Authorization Bearer) de rutas protegidas.
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyIjp7ImlkIjoiNTVm..."
        400:
          description: Error de validación (faltan datos).
        401:
          description: Credenciales inválidas (contraseña incorrecta o usuario no encontrado).
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Credenciales inválidas"
        500:
          description: Error interno del servidor.

  /auth/me:
    get:
      summary: Obtener perfil del usuario autenticado
      description: Utiliza el JWT enviado en el header para identificar al usuario y devolver su información básica (sin la contraseña).
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Información del usuario actual obtenida correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                    example: "60d0fe4f5311236168a109ca"
                  name:
                    type: string
                    example: "Arturo"
                  email:
                    type: string
                    example: "artu22@eventmaster.com"
        401:
          description: No autorizado. No se envió el token o el token expiró/es inválido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "No hay token, permiso denegado"
        500:
          description: Error interno del servidor.